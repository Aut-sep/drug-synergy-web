# CPU-only inference environment for the Dockerized DualSyn service.
# This is intentionally separate from the official GPU training env.

name: ddi_infer
channels:
  - pytorch
  - rdkit
  - defaults
dependencies:
  - python=3.7
  - pip=22.3.1
  - pytorch=1.9.0=py3.7_cpu_0
  - rdkit=2020.09.1.0
  - numpy=1.19.2
  - pandas=1.3.5
  - scipy=1.7.3
  - scikit-learn=1.0.2
  - networkx=2.6.3
  - pip:
      - https://data.pyg.org/whl/torch-1.9.0%2Bcpu/torch_scatter-2.0.9-cp37-cp37m-linux_x86_64.whl
      - https://data.pyg.org/whl/torch-1.9.0%2Bcpu/torch_sparse-0.6.12-cp37-cp37m-linux_x86_64.whl
      - https://data.pyg.org/whl/torch-1.9.0%2Bcpu/torch_cluster-1.5.9-cp37-cp37m-linux_x86_64.whl
      - https://data.pyg.org/whl/torch-1.9.0%2Bcpu/torch_spline_conv-1.2.1-cp37-cp37m-linux_x86_64.whl
      - torch-geometric==2.0.3
